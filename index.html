<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8fa;
      --surface: #ffffff;
      --border: #e4e4ec;
      --accent: #3b6eda;
      --accent-badge: #eef2fb;
      --text: #1c1c28;
      --text-2: #52526b;
      --text-3: #9494ab;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      height: 56px;
      flex-shrink: 0;
      gap: 2rem;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .nav-tabs {
      display: flex;
      gap: 0.25rem;
      height: 100%;
      align-items: stretch;
    }

    .nav-tab {
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
      user-select: none;
      white-space: nowrap;
    }

    .nav-tab:hover {
      color: var(--text);
      background: var(--accent-badge);
    }

    .nav-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .nav-tab .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 0.5rem;
      flex-shrink: 0;
    }

    .nav-tab:nth-child(1) .dot { background: #e67e22; }
    .nav-tab:nth-child(2) .dot { background: #3d8c5c; }
    .nav-tab:nth-child(3) .dot { background: #5b7fda; }
    .nav-tab:nth-child(4) .dot { background: #d94040; }

    .frame-container {
      flex: 1;
      position: relative;
    }

    .frame-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .frame-container iframe.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 1;
    }

    .frame-container iframe.loaded {
      opacity: 1;
    }

    .frame-container iframe.active:not(.loaded) {
      opacity: 0;
    }

    .loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text-3);
      font-size: 0.875rem;
      display: none;
      z-index: 0;
    }

    .loading-indicator.visible {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .loading-indicator::before {
      content: '';
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .topbar {
        padding: 0 1rem;
        gap: 1rem;
      }

      .logo {
        font-size: 0.95rem;
      }

      .nav-tab {
        padding: 0 0.75rem;
        font-size: 0.8rem;
      }

      .nav-tab .dot {
        width: 5px;
        height: 5px;
        margin-right: 0.35rem;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">Jessie's Dashboard</div>
    <div class="nav-tabs">
      <div class="nav-tab active" data-target="frame-listings">
        <span class="dot"></span>
        交易所新币上线
      </div>
      <div class="nav-tab" data-target="frame-report">
        <span class="dot"></span>
        金融市场日报
      </div>
      <div class="nav-tab" data-target="frame-ama">
        <span class="dot"></span>
        AMA 总结
      </div>
      <div class="nav-tab" data-target="frame-asset">
        <span class="dot"></span>
        资产早报
      </div>
    </div>
  </div>
  <div class="frame-container">
    <div class="loading-indicator" id="loader">加载中...</div>
    <iframe id="frame-listings" class="active" src="https://jessiiiess.github.io/exchange-listings/"></iframe>
    <iframe id="frame-report" src="https://jessiiiess.github.io/finance-daily-report/"></iframe>
    <iframe id="frame-ama" src="https://jessiiiess.github.io/ama-summary/"></iframe>
    <iframe id="frame-asset" src="https://jessiiiess.github.io/asset-daily-report/"></iframe>
  </div>

  <script>
    const tabs = document.querySelectorAll('.nav-tab');
    const frames = document.querySelectorAll('.frame-container iframe');
    const loader = document.getElementById('loader');

    frames.forEach(frame => {
      frame.addEventListener('load', () => {
        frame.classList.add('loaded');
        if (frame.classList.contains('active')) {
          loader.classList.remove('visible');
        }
      });
    });

    function showLoader(targetFrame) {
      if (!targetFrame.classList.contains('loaded')) {
        loader.classList.add('visible');
      }
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        frames.forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        const targetFrame = document.getElementById(tab.dataset.target);
        targetFrame.classList.add('active');
        showLoader(targetFrame);
        if (targetFrame.classList.contains('loaded')) {
          loader.classList.remove('visible');
        }
      });
    });

    showLoader(document.getElementById('frame-listings'));
  </script>
</body>
</html>
